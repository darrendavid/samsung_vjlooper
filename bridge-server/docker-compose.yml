version: '3.8'

services:
  bridge-server:
    # Use pre-built image from GitHub Container Registry
    # Change YOUR_USERNAME to your GitHub username
    # image: ghcr.io/darrendavid/samsung_vjlooper/bridge-server:latest

    # Or build locally (comment out image above and uncomment below)
    build: .

    container_name: video-looper-bridge

    ports:
      - "9999:9999"

    environment:
      - PORT=9999
      - VIDEO_DIR=/videos
      - NODE_ENV=production

    volumes:
      # Mount your video directory here
      # Change the left side to point to your videos folder
      # Example: /path/to/your/videos:/videos
      - ./videos:/videos:ro  # :ro means read-only

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  default:
    driver: bridge
