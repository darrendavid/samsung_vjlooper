version: '3.8'

services:
  bridge-server:
    # Use pre-built image from GitHub Container Registry
    # Change YOUR_USERNAME to your GitHub username
    image: ghcr.io/YOUR_USERNAME/samsung_vjlooper/bridge-server:latest

    # Or build locally (comment out image above and uncomment below)
    # build: .

    container_name: video-looper-bridge
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - video-looper-net
    # If you need to access SMB shares on the host network
    # network_mode: host
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  video-looper-net:
    driver: bridge
